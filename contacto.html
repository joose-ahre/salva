<header>

    <div class="logo">

    <nav>

        <a href="index.html">Inicio</a>
        <a href="tienda.html">Tienda</a>
        <a href="contacto.html" class="activo">Contacto</a>

    </nav>

</header>

<section class="contacto">

    <div class="contacto-info">

        <h1>Contacto</h1>

        <p>

            ¿Tenés alguna consulta?
            Estamos para ayudarte.

        </p>

        <div class="datos">

            <h3>Email</h3>
            <p>contacto@salva.com</p>

            <h3>Instagram</h3>
            <p>@salva.store</p>

            <h3>Horario</h3>
            <p>Lunes a Viernes de 9:00 a 18:00</p>

        </div>

    </div>

    <form class="formulario">

        <input
            type="text"
            placeholder="Nombre"
            required
        >

        <input
            type="email"
            placeholder="Correo electrónico"
            required
        >

        <textarea
            rows="7"
            placeholder="Escribí tu mensaje..."
        ></textarea>

        <button>

            Enviar Mensaje

        </button>

    </form>

</section>

<footer>
