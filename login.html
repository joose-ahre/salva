<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesión | SALVA</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        <a href="index.html">SALVA</a>
    </div>

    <nav>

        <a href="index.html">Inicio</a>
        <a href="tienda.html">Tienda</a>
        <a href="contacto.html">Contacto</a>

    </nav>

</header>

<section class="login-container">

    <div class="login-box">

        <h1>Bienvenida</h1>

        <p>Iniciá sesión para acceder a tu cuenta.</p>

        <form id="loginForm">

            <label>Correo electrónico</label>

            <input
                type="email"
                placeholder="ejemplo@email.com"
                required
            >

            <label>Contraseña</label>

            <input
                type="password"
                placeholder="********"
                required
            >

            <div class="opciones">

                <label>

                    <input type="checkbox">

                    Recordarme

                </label>

                <a href="#">
                    ¿Olvidaste tu contraseña?
                </a>

            </div>

            <button type="submit">

                Ingresar

            </button>

        </form>

        <p class="registro">

            ¿No tenés cuenta?

            <a href="registro.html">

                Crear una

            </a>

        </p>

    </div>

</section>

<footer>

    <p>© 2026 SALVA - Todos los derechos reservados.</p>

</footer>

<script src="js/login.js"></script>

</body>

</html>
