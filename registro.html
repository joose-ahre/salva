<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear Cuenta | SALVA</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="logo">
        <a href="index.html">SALVA</a>
    </div>

    <nav>

        <a href="index.html">Inicio</a>
        <a href="tienda.html">Tienda</a>
        <a href="contacto.html">Contacto</a>

    </nav>

</header>

<section class="login-container">

    <div class="login-box">

        <h1>Crear Cuenta</h1>

        <p>Completá los datos para unirte a SALVA.</p>

        <form id="registroForm">

            <label>Nombre</label>
            <input
                type="text"
                placeholder="Tu nombre"
                required
            >

            <label>Apellido</label>
            <input
                type="text"
                placeholder="Tu apellido"
                required
            >

            <label>Correo electrónico</label>
            <input
                type="email"
                placeholder="ejemplo@email.com"
                required
            >

            <label>Contraseña</label>
            <input
                type="password"
                placeholder="********"
                required
            >

            <label>Confirmar contraseña</label>
            <input
                type="password"
                placeholder="********"
                required
            >

            <button type="submit">

                Crear Cuenta

            </button>

        </form>

        <p class="registro">

            ¿Ya tenés cuenta?

            <a href="login.html">

                Iniciar sesión

            </a>

        </p>

    </div>

</section>

<footer>

    <p>© 2026 SALVA - Todos los derechos reservados.</p>

</footer>

<script src="js/registro.js"></script>

</body>

</html>
